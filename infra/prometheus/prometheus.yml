# ============================================================
# Prometheus configuration for Fleet Monitoring Platform
# BUG FIX PR1: infra/promotheus.yml was an empty file.
#              This is the correct, non-empty configuration.
# Also: filename corrected from "promotheus" → "prometheus"
# ============================================================

global:
  scrape_interval:     15s   # How often to scrape targets
  evaluation_interval: 15s   # How often to evaluate rules
  scrape_timeout:      10s

# Alertmanager configuration (optional — wire up if using alertmanager)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

rule_files: []
# - "alert_rules.yml"

scrape_configs:

  # Prometheus itself
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Spring Boot backend via Actuator/Prometheus endpoint
  - job_name: fleet-backend
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
    static_configs:
      - targets: ['backend:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(:\d+)?'
        replacement: '${1}'
