events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    upstream backend {
        server backend:8080;
    }

    upstream frontend {
        server frontend:80;
    }

    server {
        listen 80;
        server_name _;

        # API routes → Spring Boot backend
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_read_timeout 60s;
        }

        # WebSocket (SockJS requires HTTP upgrade headers)
        # BUG FIX N1: proxy_read_timeout must be long (86400s) to keep
        # persistent WebSocket connections alive. Original value was missing.
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        # Swagger UI
        location /swagger-ui/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        location /api-docs {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # Actuator (restrict to internal only in production; open for demo)
        location /actuator/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # BUG FIX N2 (NEW): All remaining traffic goes to the React frontend.
        # The original backend-only nginx.conf had no frontend proxy block,
        # meaning the root path (/) returned 404 when accessed via Nginx.
        # This block also handles SPA client-side routing correctly: if the
        # frontend container can't find the path, it falls back to index.html.
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
