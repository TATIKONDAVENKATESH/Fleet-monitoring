version: "3.9"

# =====================================================================
# Fleet Monitoring Platform — Full Stack Docker Compose
# =====================================================================

services:

  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fleet-postgres
    environment:
      POSTGRES_DB: fleetdb
      POSTGRES_USER: ${DB_USERNAME:-fleet}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fleet123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-fleet} -d fleetdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fleet-redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Spring Boot Backend ───────────────────────────────────────
  backend:
    image: ${BACKEND_IMAGE:-fleet-monitoring-backend}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fleet-backend
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/fleetdb
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
    restart: unless-stopped

  # ── React Frontend ────────────────────────────────────────────
  # Serves static files only; all API/WS routing for the unified
  # entrypoint happens through the Nginx reverse proxy below.
  frontend:
    image: ${FRONTEND_IMAGE:-fleet-monitoring-frontend}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fleet-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Nginx Reverse Proxy ───────────────────────────────────────
  # Single entrypoint on host port 80: routes /api, /ws, /swagger-ui,
  # /actuator to the backend and everything else to the frontend.
  nginx:
    image: nginx:alpine
    container_name: fleet-nginx
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  backend_logs: