name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options: [production, staging]

env:
  REGISTRY: ghcr.io

jobs:
  # ── Build & Push Docker Images ──────────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      backend_tag:  ${{ steps.meta-backend.outputs.tags }}
      frontend_tag: ${{ steps.meta-frontend.outputs.tags }}
      repo_lc:      ${{ steps.repo.outputs.repo_lc }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute lowercase repository name
        id: repo
        run: echo "repo_lc=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta — backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo.outputs.repo_lc }}/fleet-backend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Docker meta — frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo.outputs.repo_lc }}/fleet-frontend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy via SSH to GCP Compute Engine ────────────────────────────────
  deploy:
    needs: docker-build
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout (for docker-compose)
        uses: actions/checkout@v4

      - name: Deploy to GCP VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          BACKEND_IMAGE_REF:  ${{ env.REGISTRY }}/${{ needs.docker-build.outputs.repo_lc }}/fleet-backend:latest
          FRONTEND_IMAGE_REF: ${{ env.REGISTRY }}/${{ needs.docker-build.outputs.repo_lc }}/fleet-frontend:latest
        with:
          host:     ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key:      ${{ secrets.GCP_SSH_KEY }}
          envs: BACKEND_IMAGE_REF,FRONTEND_IMAGE_REF
          script: |
            set -e
            cd /opt/fleet-monitoring

            # Sync latest code (docker-compose.yml, infra configs, etc.)
            git fetch origin main
            git reset --hard origin/main

            # Pull latest images
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull "$BACKEND_IMAGE_REF"
            docker pull "$FRONTEND_IMAGE_REF"

            # Update compose to use pre-built images
            export BACKEND_IMAGE="$BACKEND_IMAGE_REF"
            export FRONTEND_IMAGE="$FRONTEND_IMAGE_REF"

            # Rolling restart — bring up new containers before removing old
            docker compose up -d --no-build backend frontend nginx

            # Wait for backend health
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8080/actuator/health > /dev/null; then
                echo "Backend healthy after $i attempts"
                break
              fi
              sleep 5
            done

            # Clean up old images
            docker image prune -f

      - name: Notify deployment
        if: always()
        run: |
          echo "Deployment to ${{ github.event.inputs.environment || 'production' }} completed with status: ${{ job.status }}"