name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options: [production, staging]

env:
  REGISTRY: ghcr.io

jobs:
  # ── Build & Push Docker Images ──────────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      backend_tag:  ${{ steps.meta-backend.outputs.tags }}
      frontend_tag: ${{ steps.meta-frontend.outputs.tags }}
      repo_lc:      ${{ steps.repo.outputs.repo_lc }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute lowercase repository name
        id: repo
        run: echo "repo_lc=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta — backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo.outputs.repo_lc }}/fleet-backend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Docker meta — frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo.outputs.repo_lc }}/fleet-frontend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy via SSH to GCP Compute Engine ────────────────────────────────
  deploy:
    needs: docker-build
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout (for docker-compose)
        uses: actions/checkout@v4

      - name: Deploy to GCP VM via SSH
        id: deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          BACKEND_IMAGE_REF:  ${{ env.REGISTRY }}/${{ needs.docker-build.outputs.repo_lc }}/fleet-backend:latest
          FRONTEND_IMAGE_REF: ${{ env.REGISTRY }}/${{ needs.docker-build.outputs.repo_lc }}/fleet-frontend:latest
          JWT_SECRET:   ${{ secrets.JWT_SECRET }}
          DB_USERNAME:  ${{ secrets.DB_USERNAME }}
          DB_PASSWORD:  ${{ secrets.DB_PASSWORD }}
        with:
          host:     ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key:      ${{ secrets.GCP_SSH_KEY }}
          envs: BACKEND_IMAGE_REF,FRONTEND_IMAGE_REF,JWT_SECRET,DB_USERNAME,DB_PASSWORD
          # deploy.sh itself uses `set -euo pipefail` and returns:
          #   0 = deploy healthy
          #   1 = deploy failed, but automatic rollback to last known-good succeeded
          #   2 = deploy failed AND rollback failed — needs a human right now
          # We must NOT `set -e` here, or exit 1/2 would kill the SSH step
          # before we get a chance to tell those two cases apart below.
          script: |
            cd /opt/fleet-monitoring

            # Sync latest code (docker-compose.yml, infra configs, scripts/deploy.sh itself)
            git fetch origin main
            git reset --hard origin/main
            chmod +x scripts/deploy.sh

            # Fail fast and loud if a required secret is missing, instead of writing
            # an empty value and letting the app crash-loop later with a confusing error.
            for var in JWT_SECRET DB_USERNAME DB_PASSWORD; do
              if [ -z "$(eval echo \$$var)" ]; then
                echo "::error::Required secret $var is empty or not set in GitHub Actions secrets."
                exit 2
              fi
            done

            # Regenerate both .env files from GitHub Secrets on every deploy, so the VM
            # can never silently drift from what's configured in GitHub (this is what
            # caused the JWT_SECRET-missing 502 outage). Files are private to root/owner.
            umask 077
            cat > .env <<ENVEOF
            DB_USERNAME=${DB_USERNAME}
            DB_PASSWORD=${DB_PASSWORD}
            ENVEOF

            cat > backend/.env <<ENVEOF
            JWT_SECRET=${JWT_SECRET}
            ENVEOF

            chmod 600 .env backend/.env

            # Pull latest images so deploy.sh can reference them by digest-stable tag
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull "$BACKEND_IMAGE_REF"
            docker pull "$FRONTEND_IMAGE_REF"

            BACKEND_IMAGE="$BACKEND_IMAGE_REF" FRONTEND_IMAGE="$FRONTEND_IMAGE_REF" \
              ./scripts/deploy.sh
            status=$?

            if [ "$status" -eq 0 ]; then
              echo "deploy_result=success"
            elif [ "$status" -eq 1 ]; then
              echo "deploy_result=rolled_back"
              echo "New deploy failed health checks; automatically rolled back to last known-good. Site is up on the previous version — investigate the failed build before retrying."
              exit 1
            else
              echo "deploy_result=rollback_failed"
              echo "::error::New deploy AND rollback both failed health checks. Manual intervention required immediately — check 'docker compose logs' on the VM."
              exit 2
            fi

            # Only prune once we know the new (or rolled-back) containers are confirmed healthy
            docker image prune -f

      - name: Notify deployment
        if: always()
        run: |
          if [ "${{ steps.deploy.outcome }}" = "success" ]; then
            echo "✅ Deployment to ${{ github.event.inputs.environment || 'production' }} succeeded."
          else
            echo "⚠️ Deployment to ${{ github.event.inputs.environment || 'production' }} did not complete cleanly (outcome: ${{ steps.deploy.outcome }})."
            echo "Check the 'Deploy to GCP VM via SSH' step above: exit 1 means an automatic rollback already restored the previous working version; exit 2 means rollback also failed and needs immediate manual action."
          fi
          # TODO: replace with a real Slack/Teams/PagerDuty webhook call so failures
          # (especially rollback_failed) page someone instead of only living in Actions logs.